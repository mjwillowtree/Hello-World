<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "DM Sans", system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f12 0%, #1a1a24 50%, #0d0d10 100%);
      color: #e4e4e7;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.125rem;
      color: #71717a;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, World</h1>
    <p>Your simple website is ready.</p>
  </main>
</body>
</html>
